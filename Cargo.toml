[package]
name = "object-detection-draft"
version = "0.1.0"
edition = "2024"

[dependencies]
ort = { version = "2.0.0-rc.12", features = ["ndarray"] }
ndarray = "0.17.2"
image = "0.25.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
num_cpus = "1.17.0"
color-eyre = "0.6.5"
fast_image_resize = "5.1.1"

[features]
default = ['load-dyanmic']
load-dyanmic = ["ort/load-dynamic"]
