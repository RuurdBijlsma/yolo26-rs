[package]
name = "object-detection-draft"
version = "0.1.0"
edition = "2024"

[dependencies]
ort = {version = "2.0.0-rc.12", features = ["ndarray"]}
image = "0.25"
ndarray = "0.17.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rayon = "1.11.0"
num_cpus = "1.17.0"

[features]
default = ['load-dyanmic']
load-dyanmic = ["ort/load-dynamic"]